name: seafood_delivery
description: A premium seafood delivery app with real-time cart, WhatsApp OTP, and beautiful UI.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.4

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0

  # Networking
  http: ^1.2.0

  # UI Components
  cached_network_image: ^3.4.1
  pin_code_fields: ^8.0.1
  country_code_picker: ^3.0.0

  # Utilities
  url_launcher: ^6.2.3
  google_fonts: ^6.2.1
  intl: ^0.19.0
  shared_preferences: ^2.2.2

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
