name: oceanfresh_driver
description: OceanFresh driver delivery app with live tracking, route optimization, and delivery confirmation.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.4

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  firebase_messaging: ^15.1.0

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Location & Maps
  geolocator: ^13.0.0
  flutter_map: ^7.0.1
  latlong2: ^0.9.0

  # Camera / Image
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # Networking
  http: ^1.2.0

  # UI Components
  pin_code_fields: ^8.0.1
  country_code_picker: ^3.0.0
  cached_network_image: ^3.4.1
  dotted_border: ^2.1.0
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^1.2.0

  # Utilities
  google_fonts: ^6.2.1
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.3
  permission_handler: ^11.3.0
  path_provider: ^2.1.5

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
